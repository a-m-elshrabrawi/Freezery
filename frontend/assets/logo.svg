<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" fill="#1a1f2e"/>
  <g transform="translate(24,24)" stroke="#f59e0b" stroke-linecap="round" fill="none">
    <!-- 3 axes × 2 directions = 6-armed snowflake -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke-width="2.5"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke-width="2.5" transform="rotate(60)"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke-width="2.5" transform="rotate(120)"/>
    <!-- Branches on each arm -->
    <g stroke-width="1.5">
      <line x1="0" y1="-9" x2="-4" y2="-13"/>
      <line x1="0" y1="-9" x2="4" y2="-13"/>
      <line x1="0" y1="9"  x2="-4" y2="13"/>
      <line x1="0" y1="9"  x2="4"  y2="13"/>
    </g>
    <g stroke-width="1.5" transform="rotate(60)">
      <line x1="0" y1="-9" x2="-4" y2="-13"/>
      <line x1="0" y1="-9" x2="4" y2="-13"/>
      <line x1="0" y1="9"  x2="-4" y2="13"/>
      <line x1="0" y1="9"  x2="4"  y2="13"/>
    </g>
    <g stroke-width="1.5" transform="rotate(120)">
      <line x1="0" y1="-9" x2="-4" y2="-13"/>
      <line x1="0" y1="-9" x2="4" y2="-13"/>
      <line x1="0" y1="9"  x2="-4" y2="13"/>
      <line x1="0" y1="9"  x2="4"  y2="13"/>
    </g>
    <!-- Center dot -->
    <circle r="2.5" fill="#f59e0b" stroke="none"/>
  </g>
</svg>
